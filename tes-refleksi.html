<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tes Refleksi Guru Informatika</title>

<style>
body{
  font-family: Arial, Helvetica, sans-serif;
  background:#f4f6f9;
  padding:20px;
}
.container{
  max-width:800px;
  margin:auto;
  background:#fff;
  padding:24px;
  border-radius:8px;
  box-shadow:0 2px 8px rgba(0,0,0,0.08);
}
h1{text-align:center;}
.section{margin-top:30px;}
.question{margin-top:16px;}
.scale label{margin-right:10px;}
button{
  margin-top:30px;
  width:100%;
  padding:14px;
  font-size:16px;
  background:#2563eb;
  color:#fff;
  border:none;
  border-radius:6px;
  cursor:pointer;
}
.result{margin-top:30px;display:none;}
.result-box{
  margin-top:20px;
  padding:18px;
  border-radius:8px;
  border-left:8px solid;
}
.tahap-awal{background:#f1f5f9;border-color:#94a3b8;}
.tahap-menengah{background:#eef2ff;border-color:#6366f1;}
.tahap-tinggi{background:#ecfdf5;border-color:#10b981;}
</style>
</head>

<body>
<div class="container">

<h1>Tes Refleksi Mandiri<br>Guru Informatika</h1>

<p>Berikan skor <strong>1–5</strong> sesuai kondisi Anda.</p>
<p>1 = Belum saya lakukan
<p>2 = Jarang saya lakukan
<p>3 = Kadang saya lakukan
<p>4 = Sering saya lakukan
<p>5 = Sudah menjadi Kebiasaan</p>

<div class="section">
<h3>A. Metakognisi Digital</h3>
<div id="meta"></div>
</div>

<div class="section">
<h3>B. Literasi AI</h3>
<div id="ai"></div>
</div>

<button onclick="hitung()">Hitung Level Saya</button>

<div class="result" id="hasil"></div>

</div>

<script>
const metaQs = [
"Saya menyadari kekuatan dan keterbatasan saya dalam menggunakan teknologi digital atau AI saat mengajar.",
"Sebelum pembelajaran, saya merencanakan penggunaan teknologi digital atau AI.",
"Saat pembelajaran berlangsung, saya memantau apakah teknologi atau AI membantu pemahaman siswa.",
"Saya menyesuaikan strategi pembelajaran digital ketika metode kurang efektif.",
"Setelah pembelajaran, saya merefleksikan penggunaan teknologi digital atau AI.",
"Hasil refleksi tersebut saya gunakan untuk memperbaiki pembelajaran berikutnya."
];

const aiQs = [
"Saya memahami secara umum bagaimana AI bekerja dan dimanfaatkan dalam pembelajaran.",
"Saya mengetahui aktivitas pembelajaran Informatika yang dapat dibantu AI.",
"Saya mempertimbangkan keterbatasan AI sebelum menggunakannya.",
"Saya menyadari bahwa data dan bias dapat memengaruhi hasil AI.",
"Saya memperhatikan aspek etika dan dampak sosial penggunaan AI.",
"Saya memperhatikan perlindungan data dan privasi siswa."
];

function render(list, target, prefix){
  const el = document.getElementById(target);
  list.forEach((q,i)=>{
    let html = `<div class="question">${i+1}. ${q}<br>`;
    for(let n=1;n<=5;n++){
      html += `<label><input type="radio" name="${prefix}${i}" value="${n}"> ${n}</label>`;
    }
    html += `</div>`;
    el.innerHTML += html;
  });
}

render(metaQs,"meta","M");
render(aiQs,"ai","A");

function profilRefleksi(skor){
  if(skor <= 14) return {
    label:"Tahap Awal Penguatan",
    kelas:"tahap-awal",
    deskripsi:"Penggunaan teknologi dan AI masih bersifat situasional.",
    fokus:"Penguatan kesadaran peran, perencanaan dasar, dan refleksi."
  };
  if(skor <= 22) return {
    label:"Tahap Penguatan dan Konsistensi",
    kelas:"tahap-menengah",
    deskripsi:"Praktik reflektif mulai berkembang namun belum konsisten.",
    fokus:"Penguatan konsistensi perencanaan dan evaluasi."
  };
  return {
    label:"Tahap Reflektif dan Regulatif",
    kelas:"tahap-tinggi",
    deskripsi:"Penggunaan teknologi dan AI sudah reflektif dan terarah.",
    fokus:"Pendalaman refleksi profesional dan integrasi AI etis."
  };
}

function hitung(){
  let skorMeta = 0, skorAI = 0;

  for(let i=0;i<6;i++){
    const m = document.querySelector(`input[name="M${i}"]:checked`);
    const a = document.querySelector(`input[name="A${i}"]:checked`);
    if(!m || !a){
      alert("Silakan isi semua pernyataan.");
      return;
    }
    skorMeta += +m.value;
    skorAI += +a.value;
  }

  const meta = profilRefleksi(skorMeta);
  const ai = profilRefleksi(skorAI);

  document.getElementById("hasil").style.display="block";
  document.getElementById("hasil").innerHTML = `
    <h3>Hasil Refleksi Anda</h3>

    <div class="result-box ${meta.kelas}">
      <strong>Metakognisi Digital – ${meta.label}</strong>
      <p>${meta.deskripsi}</p>
      <p><em>Fokus:</em> ${meta.fokus}</p>
    </div>

    <div class="result-box ${ai.kelas}">
      <strong>Literasi AI – ${ai.label}</strong>
      <p>${ai.deskripsi}</p>
      <p><em>Fokus:</em> ${ai.fokus}</p>
    </div>
  `;

  fetch("https://script.google.com/macros/s/AKfycbyxk_Hskdex5LWjZys8SWqjXr0sbkFypm4qAm3uR5UahuMC9M6eIS2cxsq4aR8xGQ8A/exec", {
    method:"POST",
    body:JSON.stringify({
      skorMeta, tahapMeta:meta.label,
      skorAI, tahapAI:ai.label
    })
  });
}
</script>

</body>
</html>
