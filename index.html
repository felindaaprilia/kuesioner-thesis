<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Kuesioner Tesis</title>

<style>
body{
  font-family: Arial;
  background:#f4f6f9;
  padding:20px;
}

.container{
  max-width:1000px;
  margin:auto;
  background:white;
  padding:24px;
  border-radius:8px;
}

.section{
  margin-top:40px;
}

.hidden{
  display:none;
}

.question{
  border:1px solid #ddd;
  padding:15px;
  margin-top:15px;
}

.scale{
  display:grid;
  grid-template-columns:repeat(9,1fr);
}

.scale label{
  border:1px solid #ccc;
  text-align:center;
  cursor:pointer;
}

.scale input{
  display:none;
}

.scale input:checked + span{
  background:#2563eb;
  color:white;
  display:block;
}

button{
  margin-top:20px;
  padding:12px;
  width:100%;
  background:#2563eb;
  color:white;
  border:none;
}
</style>
</head>

<body>

<div class="container">

<!-- ================= INFORMED CONSENT ================= -->
<div id="consentSection">
<h2>LEMBAR PERSETUJUAN PARTISIPAN</h2>

<p><b>Judul:</b> Studi Korelasional Metakognisi Digital dan Literasi AI</p>

<p>Partisipasi bersifat sukarela dan data bersifat rahasia.</p>

<label>
<input type="radio" name="consent" value="ya"> Saya bersedia
</label><br>

<label>
<input type="radio" name="consent" value="tidak"> Saya tidak bersedia
</label>

<button onclick="lanjut()">Lanjut</button>
</div>

<!-- ================= FORM ================= -->
<div id="formSection" class="hidden">

<h2>Profil Responden</h2>

<input id="nama" placeholder="Nama"><br><br>
<input id="usia" type="number" placeholder="Usia"><br><br>
<input id="sekolah" placeholder="Sekolah"><br><br>

<!-- ================= METAKOGNISI ================= -->
<div class="section">
<h2>A. Metakognisi Digital</h2>
<div id="A"></div>
</div>

<!-- ================= LITERASI ================= -->
<div class="section">
<h2>B. Literasi AI</h2>
<div id="B"></div>
</div>

<button onclick="kirim()">Kirim</button>

</div>

</div>

<script>

// ================= DATA (41 ITEM DARI FILE) =================

const A = [
"Kesadaran kekuatan dan kelemahan dalam penggunaan AI",
"Memahami peran sebagai guru dalam penggunaan AI",
"Memiliki kendali penggunaan AI",
"Menggunakan pengalaman untuk strategi AI",
"Merencanakan penggunaan AI",
"Menyesuaikan AI dengan situasi",
"Mempertimbangkan risiko penggunaan AI",
"Menetapkan tujuan penggunaan AI",
"Merencanakan materi berbasis AI",
"Memantau penggunaan AI",
"Menganalisis efektivitas AI",
"Memeriksa pemahaman siswa",
"Menilai keputusan penggunaan AI",
"Mengevaluasi penggunaan AI",
"Mempertimbangkan strategi AI alternatif",
"Merefleksikan penggunaan AI"
];

const B = [
"Memahami AI belajar dari data",
"Memahami peran data besar",
"Memahami AI mengenali suara",
"Memahami konsep kecerdasan non-manusia",
"Memahami AI lintas bidang",
"Memahami AI tugas spesifik",
"Memahami AI umum vs sempit",
"Memahami AI bekerja kompleks",
"Memahami keterbatasan keputusan AI",
"Memahami AI tidak setara manusia",
"Memahami AI mengenali pola",
"Memahami sistem berbasis aturan",
"Memahami AI tidak berpikir seperti manusia",
"Memahami machine learning",
"Memahami ML belajar dari data",
"Memahami data training/testing",
"Memahami bias AI",
"Memahami interpretasi data",
"Memahami konteks sosial data",
"Memahami peran manusia dalam AI",
"Memahami pengawasan AI",
"Memahami transparansi AI",
"Memahami regulasi AI",
"Memahami privasi AI",
"Memahami dampak sosial AI"
];

// ================= RENDER =================

function render(list, target, prefix){
  const el = document.getElementById(target);

  list.forEach((q,i)=>{
    let html = `<div class="question">
    ${i+1}. ${q}
    <div class="scale">`;

    for(let n=1;n<=9;n++){
      html += `
      <label>
      <input type="radio" name="${prefix}${i}" value="${n}">
      <span>${n}</span>
      </label>`;
    }

    html += `</div></div>`;
    el.innerHTML += html;
  });
}

render(A,"A","A");
render(B,"B","B");

// ================= LOGIC =================

function lanjut(){
  const consent = document.querySelector('input[name="consent"]:checked');

  if(!consent){
    alert("Harus pilih persetujuan!");
    return;
  }

  if(consent.value === "tidak"){
    alert("Terima kasih.");
    return;
  }

  document.getElementById("consentSection").style.display="none";
  document.getElementById("formSection").classList.remove("hidden");
}

// ================= SUBMIT =================

function kirim(){

  // VALIDASI
  for(let i=0;i<16;i++){
    if(!document.querySelector(`input[name="A${i}"]:checked`)){
      alert("Isi semua Metakognisi!");
      return;
    }
  }

  for(let i=0;i<25;i++){
    if(!document.querySelector(`input[name="B${i}"]:checked`)){
      alert("Isi semua Literasi AI!");
      return;
    }
  }

  alert("Data berhasil dikirim (dummy)");
}
</script>

</body>
</html>
